{% extends 'expenses/base.html' %}

{% block content %}
<div class="card mx-auto" style="max-width: 500px;">
    <div class="card-body">
        <h3 class="mb-3">Create Account</h3>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-success w-100">Register</button>
        </form>

        <p class="mt-3">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>
{% endblock %}
