<!DOCTYPE html>
<html>
<head>
    <title>SpendWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background-color: #f4f7fb;">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 shadow-sm">
    <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">SpendWise</a>

    <div class="ms-auto">
        {% if user.is_authenticated %}
            <span class="text-light me-3">Hi, {{ user.username }}</span>
            <a href="{% url 'add_transaction' %}" class="btn btn-success btn-sm">+ Add Transaction</a>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
            <a href="{% url 'register' %}" class="btn btn-success btn-sm">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4 mb-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
